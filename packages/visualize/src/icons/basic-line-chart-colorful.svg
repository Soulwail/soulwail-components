<svg width="1em" height="1em" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
   第一根折线（蓝色，向下偏移0+2）
  <polyline points="6,16 14,8 22,14 30,10" fill="none" stroke="#4F8CFF" stroke-width="2.5" stroke-linejoin="round"/>
  <circle cx="6" cy="16" r="2" fill="#4F8CFF" stroke="#fff" stroke-width="1.2"/>
  <circle cx="14" cy="8" r="2" fill="#4F8CFF" stroke="#fff" stroke-width="1.2"/>
  <circle cx="22" cy="14" r="2" fill="#4F8CFF" stroke="#fff" stroke-width="1.2"/>
  <circle cx="30" cy="10" r="2" fill="#4F8CFF" stroke="#fff" stroke-width="1.2"/>
  <!-- 第二根折线（紫色，整体向下偏移6+2） -->
  <polyline points="6,22 14,14 22,20 30,16" fill="none" stroke="#A78BFA" stroke-width="2.5" stroke-linejoin="round"/>
