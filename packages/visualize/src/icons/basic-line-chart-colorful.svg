  <circle cx="22" cy="26" r="2" fill="#22D3EE" stroke="#fff" stroke-width="1.2"/>
  <circle cx="30" cy="22" r="2" fill="#22D3EE" stroke="#fff" stroke-width="1.2"/>
</svg>
