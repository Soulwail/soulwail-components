  <circle cx="14" cy="14" r="2" fill="#A78BFA" stroke="#fff" stroke-width="1.2"/>
  <circle cx="22" cy="20" r="2" fill="#A78BFA" stroke="#fff" stroke-width="1.2"/>
  <circle cx="30" cy="16" r="2" fill="#A78BFA" stroke="#fff" stroke-width="1.2"/>
  <!-- 第三根折线（青色，整体向下偏移12+2） -->
